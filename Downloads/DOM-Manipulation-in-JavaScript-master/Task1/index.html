<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Book List</title>
    <link rel="stylesheet" href="style.css">
</head>

</html>
    <h1>My Book List</h1>

    <input type="text" id="titleInput" placeholder="Book Title">
    <input type="text" id="authorInput" placeholder="Author Name">

    <button id="addBtn">Add Book</button>

    <h3>Total Books: <span id="counter">0</span></h3>

    <div id="bookContainer"></div>

    <script src="script.js"></script>

</body>
</html>
<script>

const titltInput = document.getElementById("titleInput");
const authorInput = document.getElementById("authorInput");
const addBtn= document.getElementById("addBtn");
const addBook=document.getElementById("addBook");

let bookCount = 0;
 
addBtn.addEventListener("click",addBook);

function addBook(){

    const title = titltInput.value.trim();
    const author = authorInput.value.trim();

    if(title ===""|| author===""){

        alert("please enter both title and author !");
        
        return;
    }
    const bookCard = document.createElement("div");
    bookCard.classList.add("book-card");

    bookCard.innerHTML = `
        <p><strong>Title:</strong> ${title}</p>
        <p><strong>Author:</strong> ${author}</p>
    `;

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";

    deleteBtn.addEventListener("click", function () {
        bookCard.remove();
        bookCount--;
        counter.textContent = bookCount;
    });

    bookCard.appendChild(deleteBtn);

  
    bookContainer.appendChild(bookCard);
    bookCount++;
    counter.textContent = bookCount;
    titleInput.value = "";
    authorInput.value = "";
}

</script>
</body>
</html>
